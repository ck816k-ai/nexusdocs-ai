<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TermsGuard</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
.login-box {
    background: white;
    padding: 40px 24px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    text-align: center;
    max-width: 420px;
    width: 90%;
    margin: 0 auto;
}
        .logo {
            width: 260px;
            height: auto;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #64748b;
            font-size: 17px;
            margin-bottom: 40px;
        }
.google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: white;
    color: #333;
    border: 1px solid #dadce0;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    max-width: 300px;
    margin: 24px auto 12px;
    transition: all 0.25s ease;
    text-decoration: none;
    box-sizing: border-box;
}
        .google-btn:hover {
            border-color: #4285f4;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.15);
            transform: translateY(-2px);
        }
        .footer {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 40px;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="/static/images/Logo_header.png" alt="TermsGuard" class="logo">
        
        <h1>Welcome to TermsGuard</h1>
        <p class="subtitle">Secure AI-powered contract & document intelligence</p>
        
        <a href="/auth/google" class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png"
                 alt="Google" width="24" height="24">
            <span>Continue with Google</span>
        </a>

        <!-- X Login -->
<a href="/auth/x" class="google-btn" style="background:#000; color:white; border-color:#000; display:flex; align-items:center; justify-content:center; gap:12px;">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
    <span>Continue with X</span>
</a>

        <div class="footer">
            By signing in, you agree to our 
            <a href="/privacy.html" target="_blank">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
